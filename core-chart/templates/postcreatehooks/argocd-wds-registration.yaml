{{- if and .Values.argocd.install .Values.InstallPCHs }}
apiVersion: tenancy.kflex.kubestellar.org/v1alpha1
kind: PostCreateHook
metadata:
  name: argocd-wds-registration
  labels:
    kflex.kubestellar.io/cptype: wds
spec:
  templates:
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: '{{"{{.HookName}}"}}'
    spec:
      template:
        spec:
          volumes:
          - name: wds-kubeconfig-volume
            secret:
              secretName: '{{"{{.WDSSecretName}}"}}'
          containers:
          - name: create-argocd-secret
            image: quay.io/kubestellar/kubectl:{{$.Values.KUBECTL_VERSION}}
            command: ["/bin/bash", "-c"]
            args:
            - |
              set -e
              
              # TODO: Implement kubeconfig extraction and Secret creation
              
              echo "Creating ArgoCD Secret for WDS {{"{{.ControlPlaneName}}"}}"
              
              # TODO: Get kubeconfig from mounted WDS secret at /etc/kube/wds (to be added)
              
              # Create ArgoCD cluster Secret
              cat <<YAML | kubectl apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{"{{.ControlPlaneName}}"}}-cluster
                namespace: argocd
                labels:
                  argocd.argoproj.io/secret-type: cluster
              type: Opaque
              stringData:
                name: {{"{{.ControlPlaneName}}"}}
                server: https://{{"{{.ControlPlaneName}}"}}.svc
                config: |
                  {
                    "tlsClientConfig": {
                      "insecure": false
                    }
                  }
              YAML
            volumeMounts:
            - name: wds-kubeconfig-volume
              mountPath: /etc/kube/wds
              readOnly: true
          restartPolicy: Never
      backoffLimit: 1
{{- end }}
